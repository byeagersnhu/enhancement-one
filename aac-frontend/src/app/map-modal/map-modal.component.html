<!-- Modal Backdrop 
  Clicking the backdrop closes the modal.  This creates the expected 
  "click outside to dismiss" behavior. 
-->
<div class="map-modal-backdrop"
    (click)="close.emit()">
</div>

<!-- Modal Container -->
<div class="map-modal-container">

    <!-- Close Button -->
    <button class="close-btn"
        (click)="close.emit()">
        X
    </button>

    <!-- Modal Title -->
    <h4 class="mb-3">Map for {{ animal?.name }}</h4>

    <!-- Google Map 
      Displays a map centered on the selected animal's coordinates.
      The marker uses the same computed center value.  
    -->
    <google-map
        height="400px"
        width="100%"
        [center]="center"
        [options]="mapOptions">

        <map-marker [position]="center"></map-marker>

    </google-map>
</div>
